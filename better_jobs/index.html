<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Better Jobs | LLM 面试准备工作台</title>
    <link rel="stylesheet" href="./vendor/katex/katex.min.css" />
    <link rel="stylesheet" href="./assets/styles.css?v=20260704-archify-diagrams-2" />
  </head>
  <body>
    <div id="readingProgress" class="reading-progress" aria-hidden="true"><span></span></div>
    <div class="app-shell">
      <aside class="sidebar" aria-label="模块与条目导航">
        <div class="brand">
          <span class="brand-mark">BJ</span>
          <div>
            <h1>Better Jobs</h1>
            <p>LLM Interview OS</p>
          </div>
        </div>

        <label class="search-box">
          <span>搜索当前模块</span>
          <input id="searchInput" type="search" placeholder="GRPO / OPD / MTP / DeepSeek" autocomplete="off" />
        </label>

        <nav id="moduleNav" class="module-nav" aria-label="主模块"></nav>
        <nav id="itemNav" class="item-nav" aria-label="当前模块条目"></nav>
      </aside>

      <main class="content">
        <section class="hero">
          <div>
            <p id="moduleEyebrow" class="eyebrow">Interview Workspace</p>
            <h2 id="moduleTitle">LLM 面试准备工作台</h2>
            <p id="moduleDescription">
              用 Markdown 维护知识正文，用论文库追踪证据来源，用原理代码和代码训练把理解落到可手写实现，再通过学习会话持续暴露薄弱点。
            </p>
          </div>
          <div id="moduleStats" class="hero-stats" aria-label="模块统计"></div>
        </section>

        <section id="overview" class="overview-grid" aria-label="当前模块概览"></section>
        <article id="mainArticle" class="main-article" aria-label="当前条目正文"></article>
      </main>

      <aside class="insight-panel" aria-label="诊断与记录面板">
        <section>
          <h2>当前重点</h2>
          <ul id="focusList" class="compact-list"></ul>
        </section>
        <section>
          <h2>互动记录</h2>
          <label class="note-box">
            <span>我的回答 / 复盘 / 薄弱点</span>
            <textarea id="noteInput" rows="8" placeholder="在这里记录你的回答。后续可以据此继续追问，并沉淀到知识库或训练记录。"></textarea>
          </label>
          <p id="noteStatus" class="note-status">本地自动保存</p>
        </section>
        <section>
          <h2>下一步追问</h2>
          <div id="promptList" class="qa-list"></div>
        </section>
      </aside>
    </div>

    <script src="./vendor/katex/katex.min.js"></script>
    <script src="./assets/diagrams/manifest.js"></script>
    <script src="./content/knowledge/generated-docs.js"></script>
    <script src="./content/knowledge/index.js"></script>
    <script src="./content/foundations/generated-docs.js"></script>
    <script src="./content/foundations/index.js"></script>
    <script src="./content/deepseek-papers/index.js"></script>
    <script src="./content/paper-library/index.js"></script>
    <script src="./content/principle-code/index.js"></script>
    <script src="./content/principle-code/generated-code.js"></script>
    <script src="./content/code-training/generated-code.js"></script>
    <script src="./content/code-training/generated-guides.js"></script>
    <script src="./content/code-training/index.js"></script>
    <script src="./content/learning-sessions/index.js"></script>
    <script src="./content/modules.js"></script>
    <script src="./src/markdown.js"></script>
    <script src="./src/renderers/knowledge.js"></script>
    <script src="./src/renderers/paperLibrary.js"></script>
    <script src="./src/renderers/codeSkill.js"></script>
    <script src="./src/renderers/codeTraining.js"></script>
    <script src="./src/renderers/learningSessions.js"></script>
    <script src="./src/app.js"></script>
  </body>
</html>
